<h2 mat-dialog-title>Edit {{ data.name }}</h2>
<mat-dialog-content>
  <mat-form-field appearance="fill" style="width: 100%; margin-top: 10px">
    <mat-label>Quantity</mat-label>
    <input
      matInput
      type="number"
      [(ngModel)]="newAmount"
      #amountInput="ngModel"
      (input)="updateTotal()"
      min="1"
      required
    />
  </mat-form-field>
  <mat-error *ngIf="amountInput.invalid && amountInput.touched" class="error">
    Value must be greater than 0
  </mat-error>
  <p>
    New Total: <strong>{{ newTotalUsd | currency: 'USD' }}</strong>
  </p>
</mat-dialog-content>
<mat-dialog-actions align="end">
  <button mat-button (click)="onNoClick()">Cancel</button>
  <button
    mat-raised-button
    color="primary"
    [disabled]="amountInput.invalid"
    (click)="onSave(amountInput)"
  >
    Save
  </button>
</mat-dialog-actions>
